<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="./css/style.css">
  
  <title>Frontend Mentor | Blog preview blog</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <main>
    <div class="container">
      <div class="card">
        <div class="card-image">
          <img src="./assets/images/illustration-article.svg" alt="Web 3.0 Image" class="blog-image">
        </div>
        <div class="card-content">
          <span class="blog-category">Learning</span>
          <time datetime="2023-12-21">Published 21 Dec 2023</time>
          <h2 class="blog-title">HTML & CSS foundations</h2>
          <p class="blog-description">These languages are the backbone of every website, defining structure, content, and presentation.</p>
        </div>
        <div class="blog-author">
          <img src="./assets/images/image-avatar.webp" alt="Author Avatar" class="author-avatar">
          <span class="author-name">Greg Hooper</span>
        </div>
      </div>
    </div>
  </main>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer>
</body>
</html>
